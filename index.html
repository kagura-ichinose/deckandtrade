<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deck Ledger</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block" aria-label="Deck Ledger">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <p class="eyebrow">TCG Deck Archive</p>
            <h1>Deck Ledger</h1>
          </div>
        </div>

        <div class="top-actions" aria-label="デッキ操作">
          <button class="icon-button" id="importButton" type="button" title="読み込み" aria-label="読み込み">
            <span aria-hidden="true">↥</span>
          </button>
          <button class="icon-button" id="exportButton" type="button" title="書き出し" aria-label="書き出し">
            <span aria-hidden="true">↧</span>
          </button>
          <button class="primary-button" id="newDeckButton" type="button">
            <span aria-hidden="true">＋</span>
            デッキ追加
          </button>
          <input class="visually-hidden" id="importFile" type="file" accept="application/json">
        </div>
      </header>

      <main>
        <section class="summary-panel" aria-labelledby="summaryTitle">
          <div class="summary-copy">
            <p class="eyebrow">Collection Overview</p>
            <h2 id="summaryTitle">レギュレーションごとのデッキと資産を一か所に。</h2>
          </div>
          <div class="metrics-grid" aria-label="集計">
            <article class="metric-tile">
              <span>登録デッキ</span>
              <strong id="deckCount">0</strong>
            </article>
            <article class="metric-tile">
              <span>所持カード</span>
              <strong id="ownedCount">0</strong>
            </article>
            <article class="metric-tile">
              <span>概算資産</span>
              <strong id="ownedValue">¥0</strong>
            </article>
            <article class="metric-tile">
              <span>不足予算</span>
              <strong id="missingValue">¥0</strong>
            </article>
          </div>
        </section>

        <section class="publish-panel" aria-label="公開更新">
          <div class="publish-copy">
            <p class="eyebrow">Publish Editor</p>
            <h2>公開データ更新</h2>
          </div>
          <label class="password-field">
            編集パスワード
            <input id="editPassword" type="password" autocomplete="current-password" placeholder="保存時に確認">
          </label>
          <button class="secondary-button" id="unlockButton" type="button">
            <span aria-hidden="true">✓</span>
            確認
          </button>
          <button class="icon-button" id="refreshButton" type="button" title="再読み込み" aria-label="再読み込み">
            <span aria-hidden="true">↻</span>
          </button>
          <div class="publish-status" id="publishStatus">未確認</div>
        </section>

        <section class="workspace" aria-label="デッキ一覧">
          <div class="toolbar">
            <div class="search-box">
              <span aria-hidden="true">⌕</span>
              <input id="searchInput" type="search" placeholder="デッキ名、カード名、参考サイトで検索">
            </div>
            <div class="control-group">
              <label for="sortSelect">並び順</label>
              <select id="sortSelect">
                <option value="updated">更新が新しい</option>
                <option value="value">概算資産が高い</option>
                <option value="missing">不足予算が高い</option>
                <option value="complete">完成度が高い</option>
              </select>
            </div>
          </div>

          <nav class="regulation-tabs" id="regulationTabs" aria-label="レギュレーション"></nav>

          <div class="deck-grid" id="deckGrid" aria-live="polite"></div>

          <div class="empty-state" id="emptyState" hidden>
            <div class="empty-visual" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <h2>条件に合うデッキがありません</h2>
            <p>検索やレギュレーションを変えるか、新しいデッキを登録してください。</p>
            <button class="primary-button" id="emptyAddButton" type="button">
              <span aria-hidden="true">＋</span>
              デッキ追加
            </button>
          </div>
        </section>
      </main>
    </div>

    <dialog class="deck-dialog" id="deckDialog">
      <form id="deckForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Deck Editor</p>
            <h2 id="dialogTitle">デッキを追加</h2>
          </div>
          <button class="icon-button" id="closeDialogButton" type="button" title="閉じる" aria-label="閉じる">
            <span aria-hidden="true">×</span>
          </button>
        </div>

        <div class="form-grid">
          <label>
            デッキ名
            <input id="deckName" name="deckName" type="text" required placeholder="例: サーナイトex">
          </label>
          <label>
            レギュレーション
            <input id="deckRegulation" name="deckRegulation" list="regulationList" type="text" required placeholder="例: スタンダード">
            <datalist id="regulationList">
              <option value="スタンダード"></option>
              <option value="エクストラ"></option>
              <option value="殿堂"></option>
              <option value="GLC"></option>
            </datalist>
          </label>
          <label>
            メモ
            <textarea id="deckMemo" name="deckMemo" rows="3" placeholder="採用理由、環境メモ、調整中のカードなど"></textarea>
          </label>
        </div>

        <section class="editor-section" aria-labelledby="cardsHeading">
          <div class="section-heading">
            <h3 id="cardsHeading">カードリスト</h3>
            <button class="secondary-button" id="addCardButton" type="button">
              <span aria-hidden="true">＋</span>
              行追加
            </button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th scope="col">カード名</th>
                  <th scope="col">必要</th>
                  <th scope="col">所持</th>
                  <th scope="col">単価</th>
                  <th scope="col">削除</th>
                </tr>
              </thead>
              <tbody id="cardRows"></tbody>
            </table>
          </div>
        </section>

        <section class="editor-section" aria-labelledby="referencesHeading">
          <div class="section-heading">
            <h3 id="referencesHeading">参考リンク</h3>
            <button class="secondary-button" id="addReferenceButton" type="button">
              <span aria-hidden="true">＋</span>
              リンク追加
            </button>
          </div>
          <div class="reference-list" id="referenceRows"></div>
        </section>

        <div class="dialog-footer">
          <button class="danger-button" id="deleteDeckButton" type="button">削除</button>
          <div class="footer-actions">
            <button class="secondary-button" id="cancelButton" type="button">キャンセル</button>
            <button class="primary-button" id="saveDeckButton" type="submit">保存</button>
          </div>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="site.config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
